<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VOD-Indexer{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-logo">
            <span class="logo-icon">▣</span>
            <span class="logo-text">VOD<span class="accent">Indexer</span></span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/movies" class="nav-link {% if '/movies' in request.url.path %}active{% endif %}">Películas</a>
            <a href="/series" class="nav-link {% if '/series' in request.url.path %}active{% endif %}">Series</a>
            <a href="/collections" class="nav-link {% if '/collections' in request.url.path %}active{% endif %}">Colecciones</a>
        </div>
        <div class="nav-actions">
            <button class="btn btn-scan" onclick="triggerScan()" id="scan-btn">
                ⟳ Escanear
            </button>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <div id="toast" class="toast hidden"></div>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
