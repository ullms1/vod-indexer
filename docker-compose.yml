version: "3.8"

services:
  vod-indexer:
    build: .
    container_name: vod-indexer
    restart: unless-stopped
    ports:
      - "13030:3030"
    volumes:
      # Source directories — READ ONLY (your IPTV/STRM provider output)
      - /mnt/user/Media/VOD/Movies:/vods/Movies:ro
      - /mnt/user/Media/VOD/Series:/vods/Series:ro
      # Output directories — Jellyfin/Plex/Emby will scan these
      - /mnt/user/Media/VOD/EMBY-VODS/MyMovies:/vods/MisMovies
      - /mnt/user/Media/VOD/EMBY-VODS/MySeries:/vods/MisSeries
      # Persistent data (database + posters + logs)
      - /mnt/cache/appdata/vodindexer/data:/data
    environment:
      - MOVIES_SRC=/vods/Movies
      - SERIES_SRC=/vods/Series
      - MOVIES_OUT=/vods/MisMovies
      - SERIES_OUT=/vods/MisSeries
      - DB_PATH=/data/media.db
      - POSTER_DIR=/data/posters
      - DATA_DIR=/data
